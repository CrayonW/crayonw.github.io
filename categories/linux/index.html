<script>
(function() {
  // 打字动画
  var typingWrapper = document.getElementById('typing-wrapper');
  if (typingWrapper && window.location.pathname === '/') {
    typingWrapper.style.display = 'flex';
    var text = typingWrapper.getAttribute('data-text') || 'CrayonW';
    typingWrapper.innerHTML = '';
    for (var i = 0; i < text.length; i++) {
      var span = document.createElement('span');
      span.className = 'typing-char';
      span.textContent = text[i];
      span.style.animationDelay = (i * 0.12) + 's';
      typingWrapper.appendChild(span);
    }
    var cursor = document.createElement('span');
    cursor.className = 'cursor';
    typingWrapper.appendChild(cursor);
  }

  // === 日夜切换（使用 data-theme 属性） ===
  var saved = localStorage.getItem('nexst-theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }

  if (!document.getElementById('darkmode-toggle')) {
    var btn = document.createElement('div');
    btn.id = 'darkmode-toggle';
    btn.setAttribute('role', 'button');
    btn.setAttribute('aria-label', '日夜模式切换');
    btn.innerHTML = '<i class="fa fa-adjust"></i>';
    btn.style.cssText = 'position:fixed;bottom:70px;right:20px;width:40px;height:40px;border-radius:50%;background:var(--btn-bg,#333);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:9999;font-size:20px;box-shadow:0 2px 8px rgba(0,0,0,.15);transition:all .3s;opacity:.8;';
    btn.onmouseover = function() { this.style.opacity = '1'; };
    btn.onmouseout = function() { this.style.opacity = '.8'; };
    btn.onclick = function() {
      var html = document.documentElement;
      var isDark = html.getAttribute('data-theme') === 'dark';
      if (isDark) {
        html.removeAttribute('data-theme');
        localStorage.removeItem('nexst-theme');
      } else {
        html.setAttribute('data-theme', 'dark');
        localStorage.setItem('nexst-theme', 'dark');
      }
    };
    document.body.appendChild(btn);
  }
})();
</script>
